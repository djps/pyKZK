name: CI
run-name: coverage report badges

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - 'v1'

env:
  GIST_SVG_ID: 05580cecfa0faf2ba85b2753e7bc4d7e
  GIST_JSON_ID: 4d7cd9fcf942494040e17a88864fbfdf

jobs:
  doc:
    runs-on: ubuntu-latest
    if: contains(github.ref, 'main')
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}

        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies

        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest coverage genbadge
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8

        run: |
          mkdir -p reports/flake8
          flake8 --quiet --exit-zero --exclude=v1 --statistics --tee --max-line-length=127 --output-file=./reports/flake8/flake8stats.txt .
          genbadge flake8 --input-file ./reports/flake8/flake8stats.txt -v --output-file ./flake8-badge-py${{ matrix.python-version }}.svg

      - name: Test with pytest

        run: |
          mkdir -p reports/junit
          pytest -v --junitxml=reports/junit/junit-py${{ matrix.python-version }}.xml test_runner_planar.py
          genbadge tests -v --input-file reports/junit/junit-py${{ matrix.python-version }}.xml --output-file ./tests-badge-py${{ matrix.python-version }}.svg

      - name: Coverage

        id: coverage
        run: |
          mkdir -p reports/coverage
          coverage run --omit=/usr/local/lib/* coverage_runner.py
          coverage report --omit=/usr/local/lib/* | tee coverage-py${{ matrix.python-version }}.txt
          coverage xml -o reports/coverage/coverage-py${{ matrix.python-version }}.xml --omit=/usr/local/lib/*
          genbadge coverage -v --input-file reports/coverage/coverage-py${{ matrix.python-version }}.xml --output-file ./coverage-badge-py${{ matrix.python-version }}.svg

      - name: Upload badges as artifacts (versioned)

        uses: actions/upload-artifact@v4
        with:
          name: badges-py${{ matrix.python-version }}
          path: |
            flake8-badge-py${{ matrix.python-version }}.svg
            tests-badge-py${{ matrix.python-version }}.svg
            coverage-badge-py${{ matrix.python-version }}.svg
          if-no-files-found: error

  publish-badge:
    runs-on: ubuntu-latest
    needs: doc
    if: ${{ needs.doc.result == 'success' }}
    steps:
      - name: Download badges (3.10)
        uses: actions/download-artifact@v4
        with:
          name: badges-py3.10
          path: badges/3.10

      - name: Download badges (3.11)
        uses: actions/download-artifact@v4
        with:
          name: badges-py3.11
          path: badges/3.11

      # Create a single CI badge stating both versions are passing
      - name: Create matrix status badge (3.10 & 3.11 passing)
        uses: emibcn/badge-action@v2
        with:
          label: Python
          status: 3.10 & 3.11 passing
          color: brightgreen
          path: python-matrix-badge.svg

#      - name: Upload matrix badge svg to gist
#        uses: schneegans/dynamic-badges-action@v1.6.0
#        with:
#          auth: ${{ secrets.NEW_GIST_SECRET }}
#          gistID: ${{ env.GIST_SVG_ID }}
#          filename: python-matrix-badge.svg
#          label: Python
#          message: '3.10, 3.11' 
#          color: brightgreen

      - name: Upload matrix badge json to gist
        uses: schneegans/dynamic-badges-action@v1.6.0
        with:
          auth: ${{ secrets.NEW_GIST_SECRET }}
          gistID: ${{ env.GIST_JSON_ID }}
          filename: 'test.json'
          label: Python
          message: '3.10, 3.11' 
          color: brightgreen
          forceUpdate: true
